<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎤 くだものキャッチゲーム</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

  <!-- ── 上部 UI（スコア / ライフ / タイマー） ── -->
  <div id="ui-top">
    <div id="score-display">🍎 0</div>
    <div id="lives-display">❤️❤️❤️</div>
    <div id="timer-display">⏱ 0秒</div>
  </div>

  <!-- ── ゲームキャンバス ── -->
  <div id="game-canvas-wrapper">
    <canvas id="game-canvas" width="600" height="480"></canvas>

    <!-- スタート画面 -->
    <div class="screen-overlay" id="start-screen">
      <h1>🎤 フルーツキャッチ！</h1>
      <p>
        <strong style="color:#ffd700">みぎ</strong> → 右に移動し続ける<br>
        <strong style="color:#ffd700">ひだり</strong> → 左に移動し続ける<br>
        <strong style="color:#ffd700">とまる</strong> → 止まる<br>
        <strong style="color:#ffd700">じゃんぷ</strong> → ジャンプ<br>
        <strong style="color:#ffd700">かご</strong> → かごを拾う
      </p>
      <button id="start-btn">スタート！</button>
    </div>

    <!-- ゲームオーバー画面 -->
    <div class="screen-overlay" id="gameover-screen" style="display:none">
      <h1>💀 ゲームオーバー</h1>
      <p id="gameover-score"></p>
      <button id="retry-btn">もう一度！</button>
    </div>

    <!-- エフェクトメッセージ（＋◯点 / −◯点 など） -->
    <div id="effect-msg"></div>
  </div>

  <!-- ── 下部 音声パネル ── -->
  <div id="voice-panel">
    <button id="mic-btn">🎤</button>
    <div id="voice-log">マイクボタンを押して音声認識を開始</div>
    <div id="commands-hint">
      みぎ(移動) ひだり(移動)<br>
      とまる　じゃんぷ　かご
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
